---
# Role: fncm_operator
# Creates the FNCM namespace and deploys the FNCM operator via deployoperator.py.

- name: Create FNCM namespace
  kubernetes.core.k8s:
    state: present
    definition:
      kind: Project
      apiVersion: project.openshift.io/v1
      metadata:
        name: "{{ fncm_namespace }}"
        labels:
          app: fncm

- name: Write deployoperator silent config to temp file
  ansible.builtin.copy:
    # deployoperator.py --silent reads from scripts/silent_config/silent_install_deployoperator.toml
    # inside the container (same path the PowerShell step 4 uses).
    dest: "/tmp/silent_install_deployoperator.toml"
    content: |
      LICENSE_ACCEPT = true
      PLATFORM = 1
      NAMESPACE = "{{ fncm_namespace }}"
      ENTITLEMENT_KEY = "{{ ibm_entitlement_key }}"
      PRIVATE_REGISTRY = false
      PRIVATE_REGISTRY_URL = ""
      PRIVATE_REGISTRY_USERNAME = ""
      PRIVATE_REGISTRY_PASSWORD = ""
      PRIVATE_REGISTRY_SSL_ENABLED = false
      PRIVATE_REGISTRY_SSL_CRT_PATH = ""
      GLOBAL_CATALOG = false
    mode: "0600"

- name: Copy silent config to install pod
  ansible.builtin.shell: >
    oc cp /tmp/silent_install_deployoperator.toml
    {{ install_namespace }}/install:{{ container_samples_path }}/scripts/silent_config/silent_install_deployoperator.toml
  changed_when: false

- name: Run deployoperator.py in silent mode
  ansible.builtin.shell: >
    oc exec -n {{ install_namespace }} install --
    bash -c "cd {{ container_samples_path }}/scripts &&
    python3 deployoperator.py --silent"
  register: deploy_op_result
  changed_when: true

- name: Show deployoperator output
  ansible.builtin.debug:
    var: deploy_op_result.stdout_lines

- name: Wait for FNCM operator deployment to be ready
  ansible.builtin.shell: >
    oc rollout status deployment/ibm-fncm-operator
    -n {{ fncm_namespace }}
    --timeout=300s
  register: op_ready
  retries: 3
  delay: 30
  until: op_ready.rc == 0
  changed_when: false

# ── Populate operator-shared-pvc with PostgreSQL JDBC driver ──────────────────
# In FNCM 5.7.0 the JDBC JARs were removed from the install package.
# The ban-copy-jdbc / cpe-copy-jdbc init containers copy from
# /opt/ansible/share/jdbc/ (operator-shared-pvc mount) to the Liberty
# configDropins/overrides directory.  Without the JAR, the ECMClientDS
# datasource fails to initialise (Data store is null) and Navigator never starts.
# Jobs are immutable in Kubernetes, so we delete any leftover from a prior run
# before creating a fresh one.  The job script itself is idempotent (skips
# the download if the JAR is already present in the shared PVC).

- name: Delete any leftover JDBC init job from a prior run
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: Job
    name: fncm-jdbc-init
    namespace: "{{ fncm_namespace }}"
  failed_when: false

- name: Create job to download PostgreSQL JDBC JAR into operator-shared-pvc
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: fncm-jdbc-init
        namespace: "{{ fncm_namespace }}"
      spec:
        ttlSecondsAfterFinished: 300
        template:
          spec:
            restartPolicy: OnFailure
            containers:
            - name: jdbc-init
              image: registry.access.redhat.com/ubi9/ubi-minimal:latest
              command:
              - sh
              - -c
              - |
                set -e
                JAR="{{ jdbc_postgres_jar }}"
                URL="{{ jdbc_postgres_url }}"
                SHARED=/opt/ansible/share/jdbc
                mkdir -p "$SHARED"
                if [ -f "$SHARED/$JAR" ]; then
                  echo "JAR already present: $SHARED/$JAR"
                else
                  echo "Downloading $JAR from $URL ..."
                  curl -fsSL -o "$SHARED/$JAR" "$URL"
                  echo "Downloaded: $SHARED/$JAR"
                fi
              volumeMounts:
              - name: operator-shared-folder
                mountPath: /opt/ansible/share
            volumes:
            - name: operator-shared-folder
              persistentVolumeClaim:
                claimName: operator-shared-pvc

- name: Wait for JDBC init job to complete
  ansible.builtin.shell: >
    oc wait job/fncm-jdbc-init -n {{ fncm_namespace }}
    --for=condition=complete --timeout=120s
  changed_when: false
