---
# =============================================================================
# IBM FNCM Deployment - Ansible Variables
# =============================================================================
# Edit ALL values below to match your environment before running site.yml.

# --- OpenShift Cluster ---
ocp_api_url: "https://api.homelab.home.nl:6443"
ocp_token: ""      # Leave empty to use the current 'oc login' session

# --- Namespaces ---
install_namespace:    "fncm-install"
openldap_namespace:   "fncm-openldap"
postgresql_namespace: "fncm-postgresql"
fncm_namespace:       "fncm"

# --- Storage ---
storage_class_name: "nfs-homelab"

# --- OpenLDAP ---
ldap_admin_password: "Password"
ldap_organisation:   "cp.internal"
ldap_root:           "dc=cp,dc=internal"
ldap_domain:         "cp.internal"
ldap_host:           "openldap.fncm-openldap.svc.cluster.local"
ldap_bind_dn:        "cn=admin,dc=cp,dc=internal"
ldap_port:           "389"

# --- PostgreSQL ---
postgres_db:       "postgresdb"
postgres_user:     "cpadmin"
postgres_password: "Password"
postgres_host:     "postgresql.fncm-postgresql.svc.cluster.local"
postgres_port:     "5432"

# --- FNCM Databases ---
gcd_db_name:     "devgcd"
gcd_db_user:     "devgcd"
gcd_db_password: "Password"

os1_db_name:     "devos1"
os1_db_user:     "devos1"
os1_db_password: "Password"

icn_db_name:     "devicn"
icn_db_user:     "devicn"
icn_db_password: "Password"
icn_tablespace:  "devicn_tbs"
icn_schema:      "devicn"

# --- FNCM Credentials ---
fncm_admin_user:     "cpadmin"
fncm_admin_password: "Password"
fncm_admin_group:    "cpadmins"
fncm_user_group:     "cpusers"
keystore_password:   "Password"
ltpa_password:       "Password"

# IBM Entitlement Key - https://myibm.ibm.com/products-services/containerlibrary
ibm_entitlement_key: ""

# --- License ---
# Options: FNCM.PVUProd, FNCM.PVUNonProd, FNCM.UVU, FNCM.CU
fncm_license: "FNCM.PVUNonProd"

# --- Optional Components ---
deploy_cpe:    true
deploy_graphql: true
deploy_ban:    true
deploy_css:    false
deploy_cmis:   false
deploy_tm:     false
deploy_es:     false
deploy_ier:    false
deploy_iccsap: false

# --- Paths inside install pod ---
install_path:           "/usr/install"
container_samples_path: "/usr/install/ibm-fncm-containers"
property_file_path:     "/usr/install/ibm-fncm-containers/scripts/propertyFile"
generated_files_path:   "/usr/install/ibm-fncm-containers/scripts/generatedFiles"

# --- Repository ---
fncm_repo_url: "https://github.com/ibm-ecm/ibm-fncm-containers.git"

# --- Network ---
network_cidr: "10.2.1.0/0"

# --- Images ---
ubi_image:        "ubi9/ubi:9.3"
openldap_image:   "bitnamilegacy/openldap:2.6.5"
postgresql_image: "postgres:14.7-alpine3.17"
jdk_url:          "https://github.com/ibmruntimes/semeru21-binaries/releases/download/jdk-21.0.4%2B7_openj9-0.46.1/ibm-semeru-open-jdk_x64_linux_21.0.4_7_openj9-0.46.1.tar.gz"
jdk_dir:          "jdk-21.0.4+7"

# --- Timeouts (seconds) ---
pod_ready_timeout:  600
sql_exec_timeout:   120
fncm_cr_timeout:    5400   # 90 minutes for full FNCM deployment

# =============================================================================
# ArgoCD / OpenShift GitOps  (step 8)
# =============================================================================
# Set configure_argocd: true (or pass -e configure_argocd=true) to run step 8.
# Set argocd_gitops_repo_url to your GitOps repo; leave blank to skip
# Application creation (ArgoCD will still be verified).
#
# After the argocd role runs, push the exported manifest to git:
#   git -C /tmp/fncm-gitops add manifests/
#   git -C /tmp/fncm-gitops commit -m "chore: refresh FNCMCluster manifest"
#   git -C /tmp/fncm-gitops push
# =============================================================================

configure_argocd: true   # set true via -e configure_argocd=true or AWX survey

# Namespace where OpenShift GitOps / ArgoCD is installed
argocd_namespace: "openshift-gitops"

# Name of the ArgoCD Application resource to create / update
argocd_app_name: "fncm-deploy"

# GitOps repository that holds (or will hold) the FNCM manifests.
# Example: "https://github.com/lloydngcobo/fncm-gitops"
# Leave blank to skip Application creation.
argocd_gitops_repo_url: "https://github.com/lloydngcobo/fncm-gitops"

# Directory inside the repo containing FNCM manifests
argocd_gitops_repo_path: "manifests"

# Branch, tag, or commit SHA for ArgoCD to track
argocd_gitops_revision: "HEAD"

# Local path (inside the execution environment) where the role exports the
# live FNCMCluster manifest.  Must be committed and pushed to git afterwards.
argocd_gitops_local_repo_path: "/tmp/fncm-gitops"

# Sync policy — all false = manual sync (drift detection only, no auto-apply)
argocd_auto_sync: false
argocd_self_heal: false
argocd_prune:     false
